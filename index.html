<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Finanzas</title>
<meta name="description" content="Control de cuentas y gastos mensuales">
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mis Finanzas">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ── DESIGN SYSTEM ── */
  :root {
    /* Colors - Dark Mode (Default) */
    --bg-primary: #0f172a;
    --bg-secondary: #1e293b;
    --bg-tertiary: #334155;
    --bg-elevated: #1e293b;

    --text-primary: #f8fafc;
    --text-secondary: #94a3b8;
    --text-tertiary: #64748b;

    --border-subtle: #334155;
    --border-default: #475569;

    /* Accent Colors */
    --accent-blue: #3b82f6;
    --accent-blue-light: #60a5fa;
    --accent-blue-dark: #2563eb;
    --accent-blue-subtle: rgba(59, 130, 246, 0.15);

    --accent-green: #10b981;
    --accent-green-light: #34d399;
    --accent-green-subtle: rgba(16, 185, 129, 0.15);

    --accent-red: #ef4444;
    --accent-red-light: #f87171;
    --accent-red-subtle: rgba(239, 68, 68, 0.15);

    --accent-amber: #f59e0b;
    --accent-amber-light: #fbbf24;
    --accent-amber-subtle: rgba(245, 158, 11, 0.15);

    --accent-purple: #8b5cf6;
    --accent-purple-subtle: rgba(139, 92, 246, 0.15);

    /* Shadows */
    --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.3);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4), 0 2px 4px -2px rgba(0, 0, 0, 0.3);
    --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -4px rgba(0, 0, 0, 0.4);
    --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.6), 0 8px 10px -6px rgba(0, 0, 0, 0.5);
    --shadow-glow-blue: 0 0 20px rgba(59, 130, 246, 0.3);
    --shadow-glow-green: 0 0 20px rgba(16, 185, 129, 0.3);

    /* Spacing Scale (8px base) */
    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 20px;
    --space-6: 24px;
    --space-8: 32px;
    --space-10: 40px;
    --space-12: 48px;

    /* Radii */
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --radius-xl: 20px;
    --radius-full: 9999px;

    /* Typography */
    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'JetBrains Mono', 'Fira Code', monospace;

    /* Transitions */
    --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
    --transition-base: 250ms cubic-bezier(0.4, 0, 0.2, 1);
    --transition-slow: 350ms cubic-bezier(0.4, 0, 0.2, 1);

    /* Z-index scale */
    --z-dropdown: 100;
    --z-sticky: 200;
    --z-modal: 300;
    --z-toast: 400;
  }

  /* ── LIGHT MODE ── */
  body.light {
    --bg-primary: #f8fafc;
    --bg-secondary: #ffffff;
    --bg-tertiary: #f1f5f9;
    --bg-elevated: #ffffff;

    --text-primary: #0f172a;
    --text-secondary: #475569;
    --text-tertiary: #94a3b8;

    --border-subtle: #e2e8f0;
    --border-default: #cbd5e1;

    --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
    --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.05);
    --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
  }

  /* ── BASE ── */
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    font-family: var(--font-sans);
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    padding-bottom: var(--space-12);
    transition: background-color var(--transition-slow), color var(--transition-slow);
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar {
    width: 8px;
    height: 8px;
  }
  ::-webkit-scrollbar-track {
    background: var(--bg-secondary);
    border-radius: var(--radius-full);
  }
  ::-webkit-scrollbar-thumb {
    background: var(--border-default);
    border-radius: var(--radius-full);
  }
  ::-webkit-scrollbar-thumb:hover {
    background: var(--text-tertiary);
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
    border-bottom: 1px solid var(--border-subtle);
    padding: var(--space-4) var(--space-6);
    position: sticky;
    top: 0;
    z-index: var(--z-sticky);
    display: flex;
    align-items: center;
    gap: var(--space-4);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: var(--shadow-sm);
  }

  header .logo {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-purple) 100%);
    border-radius: var(--radius-lg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    box-shadow: var(--shadow-md);
    transition: transform var(--transition-fast), box-shadow var(--transition-fast);
  }

  header .logo:hover {
    transform: scale(1.05) rotate(5deg);
    box-shadow: var(--shadow-glow-blue);
  }

  header h1 {
    font-size: 1.25rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    flex: 1;
    background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-blue-light) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header span {
    font-size: 0.75rem;
    color: var(--text-secondary);
    font-family: var(--font-mono);
    font-weight: 500;
  }

  /* ── THEME TOGGLE ── */
  .theme-toggle {
    margin-left: auto;
    background: var(--bg-tertiary);
    border: 1px solid var(--border-default);
    color: var(--text-secondary);
    width: 44px;
    height: 44px;
    border-radius: var(--radius-full);
    font-size: 1.25rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all var(--transition-fast);
    position: relative;
    overflow: hidden;
  }

  .theme-toggle::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--accent-blue-subtle) 0%, transparent 100%);
    opacity: 0;
    transition: opacity var(--transition-fast);
  }

  .theme-toggle:hover {
    border-color: var(--accent-blue);
    color: var(--accent-blue-light);
    transform: rotate(15deg) scale(1.1);
    box-shadow: var(--shadow-glow-blue);
  }

  .theme-toggle:hover::before {
    opacity: 1;
  }

  /* ── MONTH NAVIGATION ── */
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-4);
    padding: var(--space-6) var(--space-6) var(--space-4);
  }

  .month-nav button {
    background: var(--bg-secondary);
    border: 1px solid var(--border-subtle);
    color: var(--text-secondary);
    width: 40px;
    height: 40px;
    border-radius: var(--radius-full);
    font-size: 1.25rem;
    cursor: pointer;
    transition: all var(--transition-fast);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow-sm);
  }

  .month-nav button:hover {
    background: var(--accent-blue);
    border-color: var(--accent-blue);
    color: white;
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }

  .month-nav button:active {
    transform: translateY(0);
  }

  .month-nav h2 {
    font-size: 1.35rem;
    font-weight: 700;
    text-transform: capitalize;
    min-width: 220px;
    text-align: center;
    letter-spacing: 1px;
    color: var(--text-primary);
    text-shadow: 0 2px 4px rgba(0,0,0,0.2);
  }

  /* ── SUMMARY CARDS ── */
  .resumen {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--space-4);
    padding: var(--space-4) var(--space-6) var(--space-6);
  }

  @media (max-width: 640px) {
    .resumen {
      grid-template-columns: 1fr;
    }
  }

  .card {
    background: var(--bg-secondary);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-xl);
    padding: var(--space-5);
    transition: all var(--transition-base);
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow-md);
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    transition: height var(--transition-base);
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-lg);
    border-color: var(--border-default);
  }

  .card:hover::before {
    height: 4px;
  }

  .card.sueldo::before { background: linear-gradient(90deg, var(--accent-green), var(--accent-green-light)); }
  .card.deudas::before { background: linear-gradient(90deg, var(--accent-red), var(--accent-red-light)); }
  .card.balance::before { background: linear-gradient(90deg, var(--accent-blue), var(--accent-blue-light)); }

  .card.sueldo:hover { box-shadow: var(--shadow-lg), var(--shadow-glow-green); }
  .card.deudas:hover { box-shadow: var(--shadow-lg), 0 0 20px rgba(239, 68, 68, 0.2); }
  .card.balance:hover { box-shadow: var(--shadow-lg), var(--shadow-glow-blue); }

  .card .label {
    font-size: 0.75rem;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: var(--space-2);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: var(--space-2);
  }

  .card .amount {
    font-size: 1.75rem;
    font-weight: 800;
    font-family: var(--font-mono);
    letter-spacing: -1px;
  }

  .card.sueldo .amount { color: var(--accent-green); }
  .card.deudas .amount { color: var(--accent-red); }
  .card.balance .amount { color: var(--accent-blue); }

  /* ── SALARY SECTION ── */
  .sueldo-section {
    padding: 0 var(--space-6) var(--space-6);
  }

  .sueldo-box {
    background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-xl);
    padding: var(--space-5) var(--space-6);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-4);
    flex-wrap: wrap;
    transition: all var(--transition-base);
    box-shadow: var(--shadow-md);
  }

  .sueldo-box:hover {
    box-shadow: var(--shadow-lg), var(--shadow-glow-green);
    border-color: var(--accent-green);
    transform: translateY(-2px);
  }

  .sueldo-box .info {
    display: flex;
    flex-direction: column;
    gap: var(--space-1);
  }

  .sueldo-box .info .lbl {
    font-size: 0.75rem;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 600;
  }

  .sueldo-box .info .val {
    font-size: 1.75rem;
    font-weight: 800;
    color: var(--accent-green);
    font-family: var(--font-mono);
    letter-spacing: -1px;
  }

  .sueldo-box .controls {
    display: flex;
    gap: var(--space-3);
    align-items: center;
  }

  .sueldo-box input[type=number] {
    background: var(--bg-primary);
    border: 2px solid var(--border-subtle);
    color: var(--text-primary);
    font-family: var(--font-mono);
    padding: var(--space-3) var(--space-4);
    border-radius: var(--radius-lg);
    font-size: 1rem;
    width: 160px;
    outline: none;
    transition: all var(--transition-fast);
    font-weight: 500;
  }

  .sueldo-box input[type=number]:focus {
    border-color: var(--accent-green);
    box-shadow: 0 0 0 3px var(--accent-green-subtle);
  }

  /* ── ACCOUNTS SECTION ── */
  .section-title {
    padding: var(--space-6) var(--space-6) var(--space-4);
    font-size: 0.75rem;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: var(--space-2);
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border-subtle), transparent);
    margin-left: var(--space-3);
  }

  .cuentas-list {
    padding: 0 var(--space-6);
    display: flex;
    flex-direction: column;
    gap: var(--space-3);
  }

  /* ── ACCOUNT ITEM ── */
  .cuenta-item {
    background: var(--bg-secondary);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
    overflow: hidden;
    transition: all var(--transition-base);
    cursor: pointer;
    box-shadow: var(--shadow-sm);
  }

  .cuenta-item:hover {
    transform: translateY(-2px) scale(1.01);
    box-shadow: var(--shadow-md);
    border-color: var(--border-default);
  }

  .cuenta-item.pagada {
    background: linear-gradient(135deg, var(--accent-green-subtle) 0%, var(--bg-secondary) 100%);
    border-color: var(--accent-green);
    opacity: 0.85;
  }

  .cuenta-item.pagada:hover {
    box-shadow: var(--shadow-md), 0 0 20px rgba(16, 185, 129, 0.2);
  }

  .cuenta-item .main-row {
    display: flex;
    align-items: center;
    gap: var(--space-4);
    padding: var(--space-4) var(--space-5);
  }

  .cuenta-item .icon {
    width: 48px;
    height: 48px;
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    flex-shrink: 0;
    transition: transform var(--transition-fast);
    box-shadow: var(--shadow-sm);
  }

  .cuenta-item:hover .icon {
    transform: scale(1.1) rotate(5deg);
  }

  .cuenta-item .info {
    flex: 1;
  }

  .cuenta-item .nombre {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 2px;
  }

  .cuenta-item .tipo-tag {
    display: inline-flex;
    align-items: center;
    font-size: 0.65rem;
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 1px;
    background: var(--bg-tertiary);
    color: var(--text-secondary);
    padding: 3px 10px;
    border-radius: var(--radius-full);
    font-weight: 500;
  }

  .cuenta-item .monto {
    font-size: 1.25rem;
    font-weight: 700;
    font-family: var(--font-mono);
    color: var(--accent-amber);
    min-width: 100px;
    text-align: right;
    letter-spacing: -0.5px;
  }

  .cuenta-item.pagada .monto {
    color: var(--accent-green);
    text-decoration: line-through;
    opacity: 0.7;
  }

  .cuenta-item .actions {
    display: flex;
    gap: var(--space-2);
    margin-left: var(--space-3);
    opacity: 0;
    transition: opacity var(--transition-fast);
  }

  .cuenta-item:hover .actions {
    opacity: 1;
  }

  /* ── ACTION BUTTONS ── */
  .btn-icon {
    background: var(--bg-tertiary);
    border: 1px solid var(--border-subtle);
    color: var(--text-secondary);
    width: 36px;
    height: 36px;
    border-radius: var(--radius-md);
    font-size: 1rem;
    cursor: pointer;
    transition: all var(--transition-fast);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .btn-icon:hover {
    background: var(--accent-blue);
    color: white;
    border-color: var(--accent-blue);
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }

  .btn-icon.danger {
    border-color: var(--border-subtle);
    color: var(--text-secondary);
    background: transparent;
  }

  .btn-icon.danger:hover {
    background: var(--accent-red);
    color: white;
    border-color: var(--accent-red);
    box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
  }

  .btn-icon.success {
    border-color: var(--border-subtle);
    color: var(--text-secondary);
    background: transparent;
  }

  .btn-icon.success:hover {
    background: var(--accent-green);
    color: white;
    border-color: var(--accent-green);
    box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
  }

  /* ── EXPANDABLE DETAIL ── */
  .detalle {
    padding: 0 var(--space-5) var(--space-4);
    display: none;
    border-top: 1px solid var(--border-subtle);
    padding-top: var(--space-4);
    margin-top: var(--space-2);
  }

  .detalle.open {
    display: block;
    animation: slideDown 250ms ease-out;
  }

  @keyframes slideDown {
    from {
      opacity: 0;
      transform: translateY(-10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .detalle textarea {
    width: 100%;
    background: var(--bg-primary);
    border: 1px solid var(--border-subtle);
    color: var(--text-primary);
    font-family: var(--font-mono);
    font-size: 0.875rem;
    padding: var(--space-3);
    border-radius: var(--radius-md);
    resize: vertical;
    min-height: 80px;
    outline: none;
    transition: all var(--transition-fast);
  }

  .detalle textarea:focus {
    border-color: var(--accent-blue);
    box-shadow: 0 0 0 3px var(--accent-blue-subtle);
  }

  .detalle .nota-label {
    font-size: 0.65rem;
    color: var(--text-tertiary);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: var(--space-2);
    font-weight: 600;
  }

  /* ── MODAL BOTTOM SHEET ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: var(--z-modal);
    display: none;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    transition: opacity var(--transition-slow);
  }

  .modal-overlay.open {
    display: flex;
    opacity: 1;
  }

  .modal-sheet {
    background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    border-radius: var(--radius-xl) var(--radius-xl) 0 0;
    padding: var(--space-6);
    transform: translateY(100%);
    transition: transform var(--transition-slow);
    overflow-y: auto;
    border-top: 1px solid var(--border-subtle);
    box-shadow: var(--shadow-xl);
  }

  .modal-overlay.open .modal-sheet {
    transform: translateY(0);
  }

  .modal-header {
    display: flex;
    align-items: center;
    gap: var(--space-4);
    margin-bottom: var(--space-6);
    padding-bottom: var(--space-5);
    border-bottom: 1px solid var(--border-subtle);
  }

  .modal-header .icon {
    width: 56px;
    height: 56px;
    border-radius: var(--radius-lg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.75rem;
    flex-shrink: 0;
    box-shadow: var(--shadow-md);
  }

  .modal-header .info {
    flex: 1;
  }

  .modal-header .nombre {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--text-primary);
  }

  .modal-header .tipo-tag {
    display: inline-flex;
    align-items: center;
    font-size: 0.7rem;
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 1px;
    background: var(--bg-tertiary);
    color: var(--text-secondary);
    padding: 3px 10px;
    border-radius: var(--radius-full);
    font-weight: 500;
  }

  .modal-close {
    background: var(--bg-tertiary);
    border: 1px solid var(--border-subtle);
    color: var(--text-secondary);
    width: 40px;
    height: 40px;
    border-radius: var(--radius-full);
    font-size: 1.25rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all var(--transition-fast);
  }

  .modal-close:hover {
    background: var(--accent-red);
    color: white;
    border-color: var(--accent-red);
    transform: rotate(90deg);

<script>
// ───── ESTADO ─────
let mesActual = new Date().getMonth();
let anioActual = new Date().getFullYear();

const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

function clavesMes(mes, anio) { return `${anio}-${String(mes).padStart(2,'0')}`; }

function cargarDatos() {
  return JSON.parse(localStorage.getItem('finanzas_v2') || '{}');
}
function guardarDatos(data) {
  localStorage.setItem('finanzas_v2', JSON.stringify(data));
}

function getDatosMes(mes, anio) {
  const data = cargarDatos();
  const k = clavesMes(mes, anio);
  if (!data[k]) data[k] = { sueldo: 0, cuentas: [], pagadas: [] };
  return data[k];
}

function setDatosMes(mes, anio, obj) {
  const data = cargarDatos();
  const k = clavesMes(mes, anio);
  data[k] = obj;
  guardarDatos(data);
}

// ───── RENDER ─────
function render() {
  const d = getDatosMes(mesActual, anioActual);
  document.getElementById('mes-titulo').textContent = `${MESES[mesActual]} ${anioActual}`;
  document.getElementById('header-sub').textContent = `${MESES[mesActual]} ${anioActual}`;

  // Sueldo
  document.getElementById('sueldo-display').textContent = fmt(d.sueldo);
  document.getElementById('sueldo-input').value = d.sueldo || '';

  // Resumen
  const totalDeudas = d.cuentas.reduce((s,c) => s + Number(c.monto), 0);
  const totalPagado = d.cuentas.filter(c => d.pagadas.includes(c.id)).reduce((s,c) => s + Number(c.monto), 0);
  const pendiente = totalDeudas - totalPagado;
  document.getElementById('res-sueldo').textContent = fmt(d.sueldo);
  document.getElementById('res-deudas').textContent = fmt(pendiente);
  document.getElementById('res-balance').textContent = fmt(d.sueldo - pendiente);

  // Lista
  const lista = document.getElementById('lista-cuentas');
  lista.innerHTML = '';
  if (d.cuentas.length === 0) {
    lista.innerHTML = '<div class="empty">No hay cuentas este mes. Agregá una abajo ↓</div>';
  } else {
    d.cuentas.forEach(c => {
      const pagada = d.pagadas.includes(c.id);
      const el = document.createElement('div');
      el.className = 'cuenta-item' + (pagada ? ' pagada' : '');
      el.style.cursor = 'pointer';
      el.onclick = () => abrirModalCuenta(c.id);
      el.innerHTML = `
        <div class="main-row">
          <div class="icon ${iconClass(c.tipo)}">${iconEmoji(c.tipo)}</div>
          <div class="info">
            <div class="nombre">${c.nombre}</div>
            <span class="tipo-tag">${tipoLabel(c.tipo)}</span>
          </div>
          <div class="monto ${pagada ? 'pagada' : ''}">${fmt(c.monto)}</div>
        </div>
      `;
      lista.appendChild(el);
    });
  }

  renderHistorial();
}

function renderHistorial() {
  const data = cargarDatos();
  const historial = [];
  Object.entries(data).forEach(([k, d]) => {
    if (!d.pagadas || !d.cuentas) return;
    d.cuentas.forEach(c => {
      if (d.pagadas.includes(c.id)) {
        const [anio, mes] = k.split('-');
        historial.push({ ...c, mesLabel: `${MESES[parseInt(mes)-1]} ${anio}` });
      }
    });
  });
  historial.sort((a,b) => b.mesLabel > a.mesLabel ? 1 : -1);
  const el = document.getElementById('historial-lista');
  if (historial.length === 0) {
    el.innerHTML = '<div class="empty">Aún no marcaste ningún pago como pagado.</div>';
  } else {
    el.innerHTML = historial.slice(0,30).map(h => `
      <div class="historial-item">
        <div>
          <div class="hi-nombre">✅ ${h.nombre}</div>
          <div class="hi-mes">${h.mesLabel}</div>
        </div>
        <div class="hi-monto">${fmt(h.monto)}</div>
      </div>
    `).join('');
  }
}

// ───── ACCIONES ─────
function guardarSueldo() {
  const val = parseFloat(document.getElementById('sueldo-input').value) || 0;
  const d = getDatosMes(mesActual, anioActual);
  d.sueldo = val;
  setDatosMes(mesActual, anioActual, d);
  render();
}

// ───── MODAL NUEVA CUENTA ─────
function abrirModalNuevaCuenta() {
  document.getElementById('modal-nueva-cuenta').classList.add('open');
  document.body.style.overflow = 'hidden';
  actualizarIconoNuevaCuenta();
  setTimeout(() => document.getElementById('modal-nueva-nombre').focus(), 100);
}

function cerrarModalNuevaCuenta(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('modal-nueva-cuenta').classList.remove('open');
  document.body.style.overflow = '';
  limpiarFormularioNuevaCuenta();
}

function limpiarFormularioNuevaCuenta() {
  document.getElementById('modal-nueva-nombre').value = '';
  document.getElementById('modal-nueva-monto').value = '';
  document.getElementById('modal-nueva-tipo').value = 'tarjeta';
  document.getElementById('modal-nueva-nota').value = '';
}

function actualizarIconoNuevaCuenta() {
  const tipo = document.getElementById('modal-nueva-tipo').value;
  const iconEl = document.getElementById('modal-nueva-icon');
  iconEl.textContent = iconEmoji(tipo);
  iconEl.className = 'icon ' + iconClass(tipo);
}

function guardarNuevaCuenta() {
  const nombre = document.getElementById('modal-nueva-nombre').value.trim();
  const monto = parseFloat(document.getElementById('modal-nueva-monto').value) || 0;
  const tipo = document.getElementById('modal-nueva-tipo').value;
  const nota = document.getElementById('modal-nueva-nota').value.trim();

  if (!nombre || !monto) {
    alert('Completá nombre y monto');
    return;
  }

  const d = getDatosMes(mesActual, anioActual);
  d.cuentas.push({ id: Date.now().toString(), nombre, monto, tipo, nota });
  setDatosMes(mesActual, anioActual, d);
  cerrarModalNuevaCuenta();
  render();
}

function togglePago(id) {
  const d = getDatosMes(mesActual, anioActual);
  if (d.pagadas.includes(id)) {
    d.pagadas = d.pagadas.filter(p => p !== id);
  } else {
    d.pagadas.push(id);
  }
  setDatosMes(mesActual, anioActual, d);
  render();
}

function eliminarCuenta(id) {
  if (!confirm('¿Eliminar esta cuenta?')) return;
  const d = getDatosMes(mesActual, anioActual);
  d.cuentas = d.cuentas.filter(c => c.id !== id);
  d.pagadas = d.pagadas.filter(p => p !== id);
  setDatosMes(mesActual, anioActual, d);
  render();
}

function guardarNota(id, valor) {
  const d = getDatosMes(mesActual, anioActual);
  const c = d.cuentas.find(c => c.id === id);
  if (c) c.nota = valor;
  setDatosMes(mesActual, anioActual, d);
}

function toggleDetalle(elId) {
  const el = document.getElementById(elId);
  el.classList.toggle('open');
}

// ───── MODAL CUENTA ─────
let cuentaEditandoId = null;

function abrirModalCuenta(id) {
  const d = getDatosMes(mesActual, anioActual);
  const c = d.cuentas.find(c => c.id === id);
  if (!c) return;

  cuentaEditandoId = id;
  const pagada = d.pagadas.includes(id);

  document.getElementById('modal-icon').textContent = iconEmoji(c.tipo);
  document.getElementById('modal-icon').className = 'icon ' + iconClass(c.tipo);
  document.getElementById('modal-nombre-display').textContent = c.nombre;
  document.getElementById('modal-tipo-display').textContent = tipoLabel(c.tipo);
  document.getElementById('modal-monto-display').textContent = fmt(c.monto);

  document.getElementById('modal-input-nombre').value = c.nombre;
  document.getElementById('modal-input-monto').value = c.monto;
  document.getElementById('modal-input-tipo').value = c.tipo;
  document.getElementById('modal-input-nota').value = c.nota || '';

  const btnPago = document.getElementById('modal-btn-pago');
  btnPago.textContent = pagada ? '✓ Marcar como pendiente' : '✓ Marcar como pagada';
  btnPago.className = 'btn-modal btn-modal-success' + (pagada ? '' : ' inactive');
  document.getElementById('modal-monto-display').classList.toggle('pagada', pagada);

  document.getElementById('modal-cuenta').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function cerrarModalCuenta(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('modal-cuenta').classList.remove('open');
  document.body.style.overflow = '';
  cuentaEditandoId = null;
}

function guardarCambiosModal() {
  if (!cuentaEditandoId) return;
  const d = getDatosMes(mesActual, anioActual);
  const c = d.cuentas.find(c => c.id === cuentaEditandoId);
  if (!c) return;

  c.nombre = document.getElementById('modal-input-nombre').value.trim() || c.nombre;
  c.monto = parseFloat(document.getElementById('modal-input-monto').value) || 0;
  c.tipo = document.getElementById('modal-input-tipo').value;
  c.nota = document.getElementById('modal-input-nota').value.trim();

  setDatosMes(mesActual, anioActual, d);
  cerrarModalCuenta();
  render();
}

function togglePagoDesdeModal() {
  if (!cuentaEditandoId) return;
  togglePago(cuentaEditandoId);

  const d = getDatosMes(mesActual, anioActual);
  const pagada = d.pagadas.includes(cuentaEditandoId);
  const btnPago = document.getElementById('modal-btn-pago');
  btnPago.textContent = pagada ? '✓ Marcar como pendiente' : '✓ Marcar como pagada';
  btnPago.className = 'btn-modal btn-modal-success' + (pagada ? '' : ' inactive');
  document.getElementById('modal-monto-display').classList.toggle('pagada', pagada);
}

function eliminarCuentaDesdeModal() {
  if (!cuentaEditandoId) return;
  if (!confirm('¿Eliminar esta cuenta permanentemente?')) return;
  eliminarCuenta(cuentaEditandoId);
  cerrarModalCuenta();
}

// Cerrar con Escape
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('modal-cuenta').classList.contains('open')) {
      cerrarModalCuenta();
    } else if (document.getElementById('modal-nueva-cuenta').classList.contains('open')) {
      cerrarModalNuevaCuenta();
    }
  }
});

function cambiarMes(delta) {
  mesActual += delta;
  if (mesActual > 11) { mesActual = 0; anioActual++; }
  if (mesActual < 0)  { mesActual = 11; anioActual--; }
  render();
}

// ───── HELPERS ─────
function fmt(n) {
  return '$' + (parseFloat(n)||0).toLocaleString('es-AR', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}
function iconClass(tipo) {
  return { tarjeta: 'ic-tarjeta', prestamo: 'ic-prestamo', mp: 'ic-mp', servicio: 'ic-servicio', luz: 'ic-luz', alquiler: 'ic-alquiler', otro: 'ic-otro' }[tipo] || 'ic-otro';
}
function iconEmoji(tipo) {
  return { tarjeta: '💳', prestamo: '🏦', mp: '📱', servicio: '🔌', luz: '⚡', alquiler: '🏠', otro: '📌' }[tipo] || '📌';
}
function tipoLabel(tipo) {
  return { tarjeta: 'Tarjeta', prestamo: 'Préstamo', mp: 'MercadoPago', servicio: 'Servicio', luz: 'Luz', alquiler: 'Alquiler', otro: 'Otro' }[tipo] || tipo;
}

// ───── DATOS INICIALES ─────

        { id: 'colegio1',  nombre: 'Colegio',                   monto: 0, tipo: 'otro',     nota: '' },
        { id: 'grupal1',   nombre: 'Viaje Empresa Grupal',      monto: 0, tipo: 'otro',     nota: '' },
        { id: 'alquiler1', nombre: 'Alquiler',                  monto: 0, tipo: 'alquiler', nota: '' },

cargarDatosIniciales();
render();

// ── TEMA ──
function toggleTema() {
  const isLight = document.body.classList.toggle('light');
  document.getElementById('theme-toggle').textContent = isLight ? '🌙' : '☀️';
  localStorage.setItem('finanzas_tema', isLight ? 'light' : 'dark');
}
(function() {
  const tema = localStorage.getItem('finanzas_tema');
  if (tema === 'light') {
    document.body.classList.add('light');
    document.getElementById('theme-toggle').textContent = '🌙';
  }
})();

// ───── BACKUP ─────
function exportarDatos() {
  const data = cargarDatos();
  const datosCompletos = {
    version: '2.0',
    exportado: new Date().toISOString(),
    datos: data
  };
  const blob = new Blob([JSON.stringify(datosCompletos, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `finanzas-backup-${new Date().toISOString().split('T')[0]}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  mostrarStatusBackup('✅ Datos exportados correctamente', 'success');
}

function importarDatos(input) {
  const file = input.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const backup = JSON.parse(e.target.result);
      if (!backup.datos || typeof backup.datos !== 'object') {
        throw new Error('El archivo no tiene el formato correcto');
      }
      if (!confirm('⚠️ Esto reemplazará todos los datos actuales. ¿Continuar?')) {
        input.value = '';
        return;
      }
      localStorage.setItem('finanzas_v2', JSON.stringify(backup.datos));
      if (backup.tema) {
        localStorage.setItem('finanzas_tema', backup.tema);
      }
      mostrarStatusBackup('✅ Datos importados correctamente. Recargando...', 'success');
      setTimeout(() => location.reload(), 1500);
    } catch (err) {
      mostrarStatusBackup('❌ Error: ' + err.message, 'error');
    }
    input.value = '';
  };
  reader.readAsText(file);
}

function borrarTodosLosDatos() {
  if (!confirm('⚠️ ¿Estás seguro? Esto eliminará TODOS los datos permanentemente.')) return;
  if (!confirm('🚨 Última advertencia: ¿Seguro que querés borrar todo?')) return;

  localStorage.removeItem('finanzas_v2');
  localStorage.removeItem('finanzas_tema');
  mostrarStatusBackup('✅ Todos los datos han sido eliminados. Recargando...', 'success');
  setTimeout(() => location.reload(), 1500);
}

function mostrarStatusBackup(mensaje, tipo) {
  const statusEl = document.getElementById('backup-status');
  statusEl.textContent = mensaje;
  statusEl.style.color = tipo === 'success' ? 'var(--accent-green)' : 'var(--accent-red)';
  setTimeout(() => {
    statusEl.textContent = '';
  }, 5000);
}
