<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Finanzas</title>
  <meta name="description" content="Control de cuentas y gastos mensuales">
  <meta name="theme-color" content="#0f172a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mis Finanzas">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/01-variables.css">
  <link rel="stylesheet" href="assets/css/02-base.css">
  <link rel="stylesheet" href="assets/css/03-layout.css">
  <link rel="stylesheet" href="assets/css/04-components.css">
  <link rel="stylesheet" href="assets/css/05-utilities.css">
</head>
<body>

<header>
  <div class="logo">💰</div>
  <div>
    <h1>Mis Finanzas</h1>
    <span id="header-sub">Control de cuentas</span>
  </div>
  <button class="theme-toggle" id="theme-toggle" onclick="toggleTema()" title="Cambiar modo claro/oscuro">🌙</button>
</header>

<div class="month-nav">
  <button onclick="cambiarMes(-1)">‹</button>
  <h2 id="mes-titulo"></h2>
  <button onclick="cambiarMes(1)">›</button>
</div>

<div class="resumen">
  <div class="card sueldo">
    <div class="label">💼 Sueldo</div>
    <div class="amount" id="res-sueldo">$0</div>
  </div>
  <div class="card deudas">
    <div class="label">📋 A pagar</div>
    <div class="amount" id="res-deudas">$0</div>
  </div>
  <div class="card balance">
    <div class="label">⚡ Disponible</div>
    <div class="amount" id="res-balance">$0</div>
  </div>
</div>

<div class="sueldo-section">
  <div class="sueldo-box">
    <div class="info">
      <span class="lbl">💼 Sueldo mensual — Maltería Quilmes</span>
      <span class="val" id="sueldo-display">$0</span>
    </div>
    <div class="controls">
      <input type="number" id="sueldo-input" placeholder="Ingresá tu sueldo" min="0">
      <button class="btn-add" onclick="guardarSueldo()">Guardar</button>
    </div>
  </div>
</div>

<div class="section-title">📋 Cuentas del mes</div>
<div class="cuentas-list" id="lista-cuentas"></div>

<div class="nueva-cuenta-section">
  <div class="nueva-cuenta-box" onclick="abrirModalNuevaCuenta()">
    <div class="title">Agregar cuenta</div>
    <div style="color: var(--text-tertiary); font-size: 0.9rem;">Tocá para agregar una nueva cuenta</div>
  </div>
</div>

<div class="historial-section">
  <div class="section-title">✅ Historial de pagos</div>
  <div class="historial-box" id="historial-lista"></div>
</div>

<div class="section-title">🔧 Configuración</div>
<div class="backup-section">
  <div class="backup-box">
    <div style="font-size: 0.75rem; color: var(--accent-blue); text-transform: uppercase; letter-spacing: 2px; margin-bottom: var(--space-4); font-weight: 700;">Backup y Restauración</div>
    <div style="display: flex; flex-wrap: wrap; gap: var(--space-3);">
      <button class="btn-modal btn-modal-secondary" onclick="exportarDatos()" style="flex: 1; min-width: 140px; padding: var(--space-4);">
        💾 Exportar JSON
      </button>
      <button class="btn-modal btn-modal-secondary" onclick="document.getElementById('importar-input').click()" style="flex: 1; min-width: 140px; padding: var(--space-4);">
        📂 Importar JSON
      </button>
      <input type="file" id="importar-input" accept=".json" onchange="importarDatos(this)" style="display: none;">
    </div>
    <div style="margin-top: var(--space-4); padding-top: var(--space-4); border-top: 1px solid var(--border-subtle);">
      <button class="btn-modal btn-modal-danger" onclick="borrarTodosLosDatos()" style="width: 100%; padding: var(--space-4); background: transparent; border: 1px solid var(--accent-red); color: var(--accent-red);">
        🗑️ Borrar todos los datos
      </button>
    </div>
    <div id="backup-status"></div>
  </div>
</div>

<!-- MODAL NUEVA CUENTA -->
<div class="modal-overlay" id="modal-nueva-cuenta" onclick="cerrarModalNuevaCuenta(event)">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="icon ic-otro" id="modal-nueva-icon">➕</div>
      <div class="info">
        <div class="nombre">Nueva Cuenta</div>
        <span class="tipo-tag">Agregar nueva cuenta</span>
      </div>
      <button class="modal-close" onclick="cerrarModalNuevaCuenta()" title="Cerrar">✕</button>
    </div>

    <div class="modal-section">
      <label>Nombre de la cuenta *</label>
      <input type="text" id="modal-nueva-nombre" placeholder="Ej: Tarjeta Naranja">
    </div>

    <div class="modal-section">
      <label>Monto *</label>
      <input type="number" id="modal-nueva-monto" placeholder="0" min="0">
    </div>

    <div class="modal-section">
      <label>Tipo de cuenta</label>
      <select id="modal-nueva-tipo" onchange="actualizarIconoNuevaCuenta()">
        <option value="tarjeta">💳 Tarjeta</option>
        <option value="prestamo">🏦 Préstamo</option>
        <option value="mp">📱 MercadoPago</option>
        <option value="servicio">🔌 Servicio</option>
        <option value="luz">⚡ Luz</option>
        <option value="alquiler">🏠 Alquiler</option>
        <option value="otro">📌 Otro</option>
      </select>
    </div>

    <div class="modal-section">
      <label>Descripción / Nota</label>
      <textarea id="modal-nueva-nota" placeholder="Agregá una descripción o detalle opcional..."></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn-modal btn-modal-secondary" onclick="cerrarModalNuevaCuenta()">
        Cancelar
      </button>
      <button class="btn-modal btn-modal-success" onclick="guardarNuevaCuenta()">
        💾 Agregar Cuenta
      </button>
    </div>
  </div>
</div>

<!-- MODAL EDITAR CUENTA -->
<div class="modal-overlay" id="modal-cuenta" onclick="cerrarModalCuenta(event)">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="icon" id="modal-icon">💳</div>
      <div class="info">
        <div class="nombre" id="modal-nombre-display">Cuenta</div>
        <span class="tipo-tag" id="modal-tipo-display">Tipo</span>
      </div>
      <button class="modal-close" onclick="cerrarModalCuenta()" title="Cerrar">✕</button>
    </div>

    <div class="modal-monto-display" id="modal-monto-display">$0</div>

    <div class="modal-section">
      <label>Nombre de la cuenta</label>
      <input type="text" id="modal-input-nombre" placeholder="Ej: Tarjeta Naranja">
    </div>

    <div class="modal-section">
      <label>Monto</label>
      <input type="number" id="modal-input-monto" placeholder="0" min="0">
    </div>

    <div class="modal-section">
      <label>Tipo de cuenta</label>
      <select id="modal-input-tipo">
        <option value="tarjeta">💳 Tarjeta</option>
        <option value="prestamo">🏦 Préstamo</option>
        <option value="mp">📱 MercadoPago</option>
        <option value="servicio">🔌 Servicio</option>
        <option value="luz">⚡ Luz</option>
        <option value="alquiler">🏠 Alquiler</option>
        <option value="otro">📌 Otro</option>
      </select>
    </div>

    <div class="modal-section">
      <label>Descripción / Nota</label>
      <textarea id="modal-input-nota" placeholder="Agregá una descripción más detallada..."></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn-modal btn-modal-danger" onclick="eliminarCuentaDesdeModal()">
        🗑 Eliminar
      </button>
      <button class="btn-modal btn-modal-success" id="modal-btn-pago" onclick="togglePagoDesdeModal()">
        Marcar pagada
      </button>
      <button class="btn-modal btn-modal-secondary" onclick="guardarCambiosModal()">
        💾 Guardar
      </button>
    </div>
  </div>
</div>

<script src="assets/js/config.js"></script>
<script src="assets/js/storage.js"></script>
<script src="assets/js/state.js"></script>
<script src="assets/js/render.js"></script>
<script src="assets/js/handlers.js"></script>
<script src="assets/js/app.js"></script>
</body>
</html>
